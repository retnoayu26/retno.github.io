<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>PROGRAM KALKULATOR</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:'Poppins',sans-serif;
background:linear-gradient(270deg,#0f4c81,#6fb3ff,#0f4c81);
background-size:400% 400%;
animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.container{
text-align:center;
}

.judul{
color:white;
font-size:30px;
margin-bottom:20px;
font-weight:600;
letter-spacing:1px;
}

.kalkulator{
padding:25px;
border-radius:20px;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
box-shadow:0 15px 40px rgba(0,0,0,0.3);
}

#layar{
width:248px;
height:50px;
font-size:22px;
text-align:right;
border:none;
border-radius:10px;
margin-bottom:15px;
padding:10px;
box-sizing:border-box;
background:white;
font-family:'Poppins',sans-serif;
}

button{
width:55px;
height:50px;
margin:4px;
font-size:18px;
border:none;
border-radius:12px;
cursor:pointer;
background:#2196f3;
color:white;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.25);
font-family:'Poppins',sans-serif;
}

button:hover{
transform:translateY(-4px);
box-shadow:0 6px 15px rgba(0,0,0,0.35);
}

button:active{
transform:scale(0.95);
}

.operator{
background:#0d47a1;
}

.clear{
background:#e53935;
}

.equal{
background:#00acc1;
}

.copyright{
margin-top:18px;
color:white;
font-size:13px;
opacity:0.9;
}

</style>

</head>

<body>

<div class="container">

<div class="judul">PROGRAM KALKULATOR</div>

<div class="kalkulator">

<input id="layar" readonly>

<br>

<button onclick="tekanAngka('1')">1</button>
<button onclick="tekanAngka('2')">2</button>
<button onclick="tekanAngka('3')">3</button>
<button class="operator" onclick="tekanOperator('+')">+</button>

<br>

<button onclick="tekanAngka('4')">4</button>
<button onclick="tekanAngka('5')">5</button>
<button onclick="tekanAngka('6')">6</button>
<button class="operator" onclick="tekanOperator('-')">-</button>

<br>

<button onclick="tekanAngka('7')">7</button>
<button onclick="tekanAngka('8')">8</button>
<button onclick="tekanAngka('9')">9</button>
<button class="operator" onclick="tekanOperator('*')">*</button>

<br>

<button class="clear" onclick="empty()">C</button>
<button onclick="tekanAngka('0')">0</button>
<button class="equal" onclick="hitung()">=</button>
<button class="operator" onclick="tekanOperator('/')">/</button>

</div>

<div class="copyright">
Copyright &copy; 2026 by Retno Ayu Wulansari
</div>

</div>

<script>

function tekanAngka(angka){
document.getElementById("layar").value += angka;
}

function tekanOperator(operator){
document.getElementById("layar").value += operator;
}

function hitung(){
document.getElementById("layar").value =
eval(document.getElementById("layar").value);
}

function empty(){
document.getElementById("layar").value = "";
}

</script>

</body>
</html>
